services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    container_name: vulnarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vulnarena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vulnarena}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulnarena}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Cache ──
  redis:
    image: redis:7-alpine
    container_name: vulnarena-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Go API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vulnarena-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-vulnarena}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vulnarena}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://vulnarena.com,https://www.vulnarena.com}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-25}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - backend

  # ── Migrations (run once) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vulnarena-migrate
    entrypoint: ["/app/migrate", "-direction", "up"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vulnarena}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vulnarena}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  # ── SvelteKit Frontend ──
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: vulnarena-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      ORIGIN: ${ORIGIN:-https://vulnarena.com}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - frontend

  # ── Nginx Reverse Proxy ──
  # Terminates TLS for vulnarena.com. The cert is provisioned and renewed by
  # the certbot service below. Run init-letsencrypt.sh once on a fresh host
  # before `docker compose up -d` to issue the first cert.
  nginx:
    image: nginx:1.27-alpine
    container_name: vulnarena-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    # Reload every 12h so newly-renewed certs are picked up without bouncing.
    command: >
      /bin/sh -c "while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # ── Certbot — Let's Encrypt cert issuance + automatic renewal ──
  certbot:
    image: certbot/certbot:latest
    container_name: vulnarena-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Check for renewal every 12h. Certbot is a no-op until certs are
    # within 30 days of expiry.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
    depends_on:
      - nginx

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot_webroot:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
