services:
  # ── Cache ──
  # Postgres is hosted externally on Neon (serverless). DATABASE_URL points
  # directly at the Neon -pooler endpoint and is supplied via .env. The
  # in-stack Postgres service was removed in the Neon migration.
  redis:
    image: redis:7-alpine
    container_name: vulnarena-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Go API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vulnarena-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required (Neon connection string)}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://vulnarena.com,https://www.vulnarena.com}
      # Neon's pooler endpoint is pgbouncer in transaction mode. Keep the
      # pool small — pgbouncer fans out a single backend across many
      # short-lived client connections, and over-pooling on the client
      # side just creates contention without throughput.
      DB_MAX_CONNS: ${DB_MAX_CONNS:-15}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-2}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - backend

  # ── Migrations (run once against Neon) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vulnarena-migrate
    entrypoint: ["/app/migrate", "-direction", "up"]
    environment:
      # Prefer the Neon DIRECT (non-pooler) endpoint for migrations — golang-migrate's
      # advisory lock can stall over Neon's pgbouncer pooler. Falls back to the pooler
      # DATABASE_URL when MIGRATE_DATABASE_URL is unset.
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-${DATABASE_URL}}
    restart: "no"
    networks:
      - backend

  # ── Nginx Reverse Proxy ──
  # Hybrid deploy: the SvelteKit frontend runs on Vercel (vulnarena.com); this
  # stack only serves the Go API at api.vulnarena.com. nginx terminates TLS for
  # api.vulnarena.com and proxies /api, /health and the WebSocket endpoint to
  # the api service. The cert is provisioned and renewed by the certbot service
  # below — run init-letsencrypt.sh once on a fresh host before
  # `docker compose up -d` to issue the first cert.
  nginx:
    image: nginx:1.27-alpine
    container_name: vulnarena-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    # Reload every 12h so newly-renewed certs are picked up without bouncing.
    command: >
      /bin/sh -c "while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  # ── Certbot — Let's Encrypt cert issuance + automatic renewal ──
  certbot:
    image: certbot/certbot:latest
    container_name: vulnarena-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Check for renewal every 12h. Certbot is a no-op until certs are
    # within 30 days of expiry.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
    depends_on:
      - nginx

volumes:
  redisdata:
  letsencrypt:
  certbot_webroot:

networks:
  backend:
    driver: bridge
