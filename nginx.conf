# ============================================================
# VulnArena production reverse proxy.
#
# Termination model:
#   :80  -> serves /.well-known/acme-challenge for certbot HTTP-01,
#           redirects everything else to https://$server_name$request_uri.
#   :443 -> terminates TLS with the Let's Encrypt cert mounted at
#           /etc/letsencrypt/live/${DOMAIN}/. Proxies /api/ and /health
#           to the Go API and everything else to the SvelteKit Node SSR.
#
# The cert is provisioned by the `certbot` service in docker-compose.prod.yml.
# DOMAIN, EMAIL come from the .env file.
# ============================================================

upstream api_backend {
    server api:8080;
    keepalive 32;
}

upstream web_frontend {
    server web:3000;
    keepalive 32;
}

# Global rate-limit zones (server-side rate-limit is also enforced in Go
# middleware; this is defense-in-depth at the edge).
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_rl:10m;

# ── HTTP :80 — ACME challenge + permanent redirect to HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name vulnarena.com www.vulnarena.com;

    # Certbot writes challenge files into this volume-mounted directory.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — application traffic ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vulnarena.com www.vulnarena.com;

    ssl_certificate     /etc/letsencrypt/live/vulnarena.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vulnarena.com/privkey.pem;

    # Modern TLS profile — TLS 1.2/1.3 only, Mozilla intermediate ciphers.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers — defense-in-depth alongside Go middleware.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Upload caps. Submissions and code blobs are small; cap to prevent abuse.
    client_max_body_size 2m;
    client_body_buffer_size 128k;
    client_header_timeout 10s;
    client_body_timeout 10s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/xml image/svg+xml font/woff2;

    limit_conn conn_rl 50;

    # Health check passthrough (no TLS redirect ping-pong).
    location = /health {
        access_log off;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Auth endpoints — tighter rate limit.
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_rl burst=10 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WebSocket endpoint for co-op collaboration.
    location /api/v1/ws {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # General API reverse proxy.
    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SvelteKit SSR + static assets.
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
